<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Experiment</title>
    <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
    <div class="container">
        <div class="setup-screen active">
            <h1>Feedback Experiment</h1>

            <div class="input-group">
                <label for="participantName">Participant Name:</label>
                <input type="text" id="participantName" placeholder="Enter your name here">
            </div>

            <button type="button" onclick="startExperiment()">Begin Experiment</button>
        </div>

        <div class="experiment-screen">
            <div class="game-info">Game <span id="gameNumber">1</span> of 3</div>
            <div class="timer" id="timer">10:00</div>
            
            <div class="pattern-display" id="patternDisplay"></div>
            
            <div class="button-grid" id="buttonGrid"></div>
        </div>

        <div class="complete-screen">
            <h1>Experiment Complete</h1>
            <p style="text-align: center;"><i>Please take a screenshot of results and send to <a href="mailto:mie286project@gmail.com">mie286project@gmail.com</a>!</i></p>
            <div class="results" id="results"></div>
        </div>
    </div>

    <script src="./src/main.js" type="module"></script>
</body>
</html>
